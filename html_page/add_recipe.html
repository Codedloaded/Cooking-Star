<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Add New Recipe - Cooking-Star</title>
</head>
<body>

    <!-- Admin Navigation Bar -->
    <div>
        <img src="logo.jpg" alt="logo" height="100" width="100">
        <a href="admin.html">Home</a>
        <span>|</span>
        <a href="add_recipe.html">Add Recipe</a>
        <span>|</span>
        <a href="manage-recipes.html">Manage Recipes</a>
        <span>|</span>
        <a href="login.html">Logout</a>
    </div>
    <hr>

    <h2>Add New Recipe</h2>

    <form action="manage-recipes.html">
        <h3>Recipe Information</h3>

        <label for="recipeName">Recipe Name:</label><br>
        <input type="text" id="recipeName" name="recipeName" placeholder="Enter recipe name" required><br><br>

        <label for="course">Course Type:</label><br>
        <select id="course" name="course">
            <option value="appetizers">Appetizers</option>
            <option value="main">Main Course</option>
            <option value="dessert">Dessert</option>
        </select><br><br>

        <label>Average Cooking Time (minutes):</label><br>
        <input type="number" name="time" placeholder="e.g. 30"><br><br>

        <label>Difficulty Level (1 = Easy, 5 = Hard):</label><br>
        <input type="range" name="difficulty" min="1" max="5"><br><br>

        <label>Upload Recipe Image:</label><br>
        <input type="file" name="recipeImage"><br><br>

        <hr>
        <h3>Ingredients</h3>

        <label>Ingredient 1:</label><br>
        <input type="text" name="ingredient1" placeholder="Ingredient name"><br><br>

        <label>Quantity:</label><br>
        <input type="text" name="quantity1" placeholder="e.g. 200g"><br><br>

        <label>Ingredient 2:</label><br>
        <input type="text" name="ingredient2" placeholder="Ingredient name"><br><br>

        <label>Quantity:</label><br>
        <input type="text" name="quantity2" placeholder="e.g. 1 cup"><br><br>

        <label>Ingredient 3:</label><br>
        <input type="text" name="ingredient3" placeholder="Ingredient name"><br><br>

        <label>Quantity:</label><br>
        <input type="text" name="quantity3" placeholder="e.g. 1 tsp"><br><br>

        <hr>
        <h3>Instructions</h3>

        <label for="instructions">Preparation Instructions:</label><br>
        <textarea id="instructions" name="instructions" rows="6" cols="50" placeholder="Write step-by-step instructions..."></textarea><br><br>

        <label for="mistakes">Common Mistakes:</label><br>
        <textarea id="mistakes" name="mistakes" rows="4" cols="50" placeholder="List common mistakes to avoid..."></textarea><br><br>

        <input type="submit" value="Save Recipe">
        <input type="reset" value="Clear">

    </form>

</body>
</html>
