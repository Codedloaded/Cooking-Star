<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Add New Recipe - Cooking-Star</title>

    <!-- Google Font -->
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&family=Fredoka+One&display=swap" rel="stylesheet">

    <!-- CSS -->
    <link rel="stylesheet" href="add_recipe1.css">
</head>
<body>

<!-- Navbar -->
<div class="navbar">
    <div class="logo-wrapper">
    <img src="NewLogo.png" class="logo-img">
</div>
    <a href="admin.html">Home</a>
    <a href="add_recipe.html">Add Recipe</a>
    <a href="manage-recipes.html">Manage Recipes</a>
    <a href="login.html">Logout</a>
</div>

<h2>Add New Recipe</h2>

<form onsubmit="return saveRecipe()">

    <!-- Recipe Info -->
    <div class="section-card">
        <h3>Recipe Information</h3>

        <label>Recipe Name:</label>
        <input type="text" id="recipeName">
        <div class="error-msg" id="nameError">Please enter recipe name</div>

        <label>Course Type:</label>
        <select id="courseType">
            <option value="">Select a course</option>
            <option>🥗 Appetizers</option>
            <option>🍽️ Main Course</option>
            <option>🍰 Dessert</option>
        </select>
        <div class="error-msg" id="courseError">Please select course type</div>

        <label>Cooking Time (minutes):</label>
        <input type="number" id="cookingTime">
        <div class="error-msg" id="timeError">Please enter valid cooking time</div>

        <label>Upload Image:</label>
        <input type="file" id="imageInput">
        <div id="imagePreview"></div>
    </div>

    <!-- Ingredients -->
    <div class="section-card">
        <h3>Ingredients</h3>

        <div id="ingredientsContainer"></div>

        <button type="button" id="addIngredientBtn" class="btn-secondary">
            + Add Ingredient
        </button>

        <div class="error-msg" id="ingredientError">Please add at least one ingredient</div>
    </div>

    <!-- Instructions -->
    <div class="section-card">
        <h3>Instructions</h3>

        <label>Preparation:</label>
        <textarea id="instructions"></textarea>
        <div class="error-msg" id="instructionsError">Please enter preparation instructions</div>

        <label>Common Mistakes:</label>
        <textarea id="mistakes"></textarea>
    </div>

    <!-- Buttons -->
    <div class="btn-group">
        <input type="submit" value="💾 Save Recipe">
        <input type="reset" value="🗑️ Clear" onclick="clearForm()">
    </div>

</form>

<script src="add_r.js"></script>

</body>
</html>
