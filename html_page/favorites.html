<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>My Favorites вҖ” ЩҶШ¬Щ…Ш© Ш§Щ„Ш·ШЁШ®</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

  <!-- в”Җв”Җв”Җ Floating Glitter Stars в”Җв”Җв”Җ -->
  <div id="glitter-container"></div>

  <!-- в”Җв”Җв”Җ Chef Duo Corner в”Җв”Җв”Җ -->
  <div class="chef-duo-deco"></div>

  <!-- в”Җв”Җв”Җ Navigation Bar в”Җв”Җв”Җ -->
  <nav class="navbar">
    <a href="user-dashboard.html" class="logo-link">
      <img src="NewLogo.png" alt="Chef's Logo" class="logo-img">
    </a>
    <div class="nav-links">
      <a href="user-dashboard.html"> Home</a>
      <a href="recipes-list.html"> Recipes</a>
      <a href="search-results.html"> Search</a>
      <a href="favorites.html" class="active"> Favorites</a>
      <a href="login.html" class="logout"> Logout</a>
    </div>
  </nav>

  <!-- в”Җв”Җв”Җ Page Header в”Җв”Җв”Җ -->
  <div class="page-header">
    <h2>My Favorite Recipes</h2>
    <p>Your personal collection of delicious saves </p>
  </div>

  <div class="container">

    <!-- в”Җв”Җв”Җ Add to Favorites Card в”Җв”Җв”Җ -->
    <div class="card">
      <h3>вһ• Add a Recipe to Favorites</h3>
      <form id="add-fav-form">
        <div style="display:flex; gap:14px; flex-wrap:wrap; align-items:flex-end;">
          <div class="form-group" style="flex:1; min-width:200px; margin-bottom:0;">
            <label for="recipePick">Choose a Recipe:</label>
            <select id="recipePick" name="recipe">
              <option value="">вҖ” Select a recipe вҖ”</option>
              <option value="grilled-chicken"> Grilled Chicken вҖ” Main Course</option>
              <option value="spaghetti-bolognese"> Spaghetti Bolognese вҖ” Main Course</option>
              <option value="caesar-salad">Caesar Salad вҖ” Appetizer</option>
              <option value="alfredo-pasta"> Chicken Alfredo Pasta вҖ” Main Course</option>
              <option value="lava-cake"> Chocolate Lava Cake вҖ” Dessert</option>
              <option value="sambosa"> Sambosa вҖ” Appetizer</option>
            </select>
          </div>
          <button type="submit" class="btn btn-primary" style="height:44px;">
            Add to Favorites
          </button>
        </div>
        <p id="add-fav-error" style="color:var(--pink-deep); font-weight:700; margin-top:10px; font-size:0.9rem;"></p>
      </form>
    </div>

    <!-- в”Җв”Җв”Җ My Favorites List в”Җв”Җв”Җ -->
    <div class="card">
      <div style="display:flex; align-items:center; justify-content:space-between; flex-wrap:wrap; gap:12px; margin-bottom:18px;">
        <h3 style="margin-bottom:0;"> Saved Recipes</h3>
        <div class="search-bar" style="max-width:280px;">
          <input type="search" id="fav-search" placeholder=" Filter favorites...">
        </div>
      </div>

      <div id="fav-empty" class="empty-state" style="display:none;">
        <div class="emoji">рҹ«ҷ</div>
        <p>No favorites yet! Add some recipes above.</p>
      </div>

      <div style="overflow-x:auto;">
        <table class="favorites-table">
          <thead>
            <tr>
              <th>Image</th>
              <th>Recipe Name</th>
              <th>Course</th>
              <th>Description</th>
              <th>Actions</th>
            </tr>
          </thead>
          <tbody id="fav-tbody"></tbody>
        </table>
      </div>
    </div>

  </div>

  <div id="toast"></div>

  <script src="shared.js"></script>
  <script src="favorites.js"></script>
  <script>
    // в”Җв”Җв”Җ Glitter Stars Generator в”Җв”Җв”Җ
    const STARS = ['вңҰ','вң§','вҳ…','вҳҶ','вңЁ','рҹ’«','вӯҗ','рҹҢҹ','рҹҘ„','рҹҚ•','рҹҚӯ','рҹҚ©', 'рҹҚӘ','рҹҚҮ','рҹҚ“','рҹҚ’','рҹҚ«','рҹҚҙ','рҹҚ§','рҹҢ¶пёҸ'];
    const container = document.getElementById('glitter-container');
    function spawnStar() {
      const el = document.createElement('div');
      el.className = 'glitter-star';
      el.textContent = STARS[Math.floor(Math.random() * STARS.length)];
      el.style.left = Math.random() * 100 + 'vw';
      el.style.fontSize = (0.6 + Math.random() * 1.4) + 'rem';
      el.style.animationDuration = (5 + Math.random() * 8) + 's';
      el.style.animationDelay = (Math.random() * 3) + 's';
      el.style.color = ['#ff5c8a','#ffd700','#ff007f','#ffb347','#ff99bb','#fff176'][Math.floor(Math.random()*6)];
      container.appendChild(el);
      setTimeout(() => el.remove(), 14000);
    }
    setInterval(spawnStar, 600);
    for(let i=0;i<12;i++) setTimeout(spawnStar, i*200);
  </script>
</body>
</html>
