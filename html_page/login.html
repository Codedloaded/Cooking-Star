<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login - Cooking-Star</title>
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="MM.css"> </head>

</head>
<body>
<div id="glitter-container"></div>
    <nav class="navbar">
        <a href="index.html" class="logo-link">
            <img src="newlogo.png" alt="Cooking Star Logo" class="logo-img">
        </a>
        <div class="nav-links">
            <a href="index.html">Home</a>
            <a href="login.html" class="active">Login</a>
            <a href="signup.html">Sign Up</a>
        </div>
    </nav>

    <header class="page-header">
    <h1>Welcome to Cooking-Star!</h1>
    <p>Discover and share amazing recipes from around the world.</p>
</header>

<main class="auth-container"> <div class="card" style="max-width: 500px; width: 100%;">
        <h3>Login to Your Account</h3>

        <form>
            <div class="form-group-horizontal">
                <label for="email">Email:</label>
                <input type="email" id="email" placeholder="Enter your email" required>
            </div>

            <div class="form-group-horizontal">
                <label for="password">Password:</label>
                <input type="password" id="password" placeholder="Enter your password" required>
            </div>

            <div class="role-selection">
                <label style="display:inline;"><input type="radio" name="role" value="user" checked> User</label>
                <label style="display:inline;"><input type="radio" name="role" value="admin"> Admin</label>
            </div>

            <button type="submit" class="btn btn-primary" style="width: 100%; justify-content: center;">Login</button>
        
            <p class="auth-footer">
    Don't have an account? <a href="signup.html">Register here</a>
</p>
    </form>
    </div>
</main>
    
<script src="shared.js"></script>
        <script>
        const loginForm = document.querySelector('form');
        loginForm.addEventListener('submit', function(event) {
            event.preventDefault(); 
            showToast("Welcome back! Logging you in... 🍰");
                        setTimeout(() => {
                window.location.href = "user-dashboard.html";
            }, 100);
        });
    </script>
    <script src="glitter.js"></script>
</body>
</html>
