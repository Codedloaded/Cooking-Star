<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Recipe Details — نجمة الطبخ</title>
  <link rel="stylesheet" href="style.css">
  <link rel="icon" type="image/png" href="icon.png">
</head>
<body>

  <div id="glitter-container"></div>
  <div class="chef-duo-deco"></div>

  <!-- ─── Navigation Bar ─── -->
  <nav class="navbar">
    <a href="user-dashboard.html" class="logo-link">
      <img src="NewLogo.png" alt="Chef's Logo" class="logo-img">
    </a>
    <div class="nav-links">
      <a href="user-dashboard.html"> Home</a>
      <a href="recipes-list.html"> Recipes</a>
      <a href="search-results.html"> Search</a>
      <a href="favorites.html"> Favorites</a>
      <a href="login.html" class="logout"> Logout</a>
    </div>
  </nav>

  <!-- ─── Page Header ─── -->
  <div class="page-header">
    <h2>Recipe Details</h2>
    <p>Explore step-by-step instructions for your favourite dishes </p>
  </div>

  <div class="container">

    <div class="card" style="padding:22px 30px;">
      <h3 style="margin-bottom:12px; font-size:1.15rem;">Jump to a Recipe</h3>
      <div class="recipe-jump-nav" id="jump-nav"></div>
    </div>

    <div class="section-divider">✦ ✦ ✦</div>

    <div id="recipes-container"></div>

  </div>

  <div id="toast"></div>

  <script src="shared.js"></script>
  <script src="recipe-detail.js"></script>
  <script>
    const STARS = ['✦','✧','★','☆','✨','💫','⭐','🌟','🥄','🍕','🍭','🍩', '🍪','🍇','🍓','🍒','🍫','🍴','🍧','🌶️'];
    const container = document.getElementById('glitter-container');
    function spawnStar() {
      const el = document.createElement('div');
      el.className = 'glitter-star';
      el.textContent = STARS[Math.floor(Math.random() * STARS.length)];
      el.style.left = Math.random() * 100 + 'vw';
      el.style.fontSize = (0.6 + Math.random() * 1.4) + 'rem';
      el.style.animationDuration = (5 + Math.random() * 8) + 's';
      el.style.animationDelay = (Math.random() * 3) + 's';
      el.style.color = ['#ff5c8a','#ffd700','#ff007f','#ffb347','#ff99bb','#fff176'][Math.floor(Math.random()*6)];
      container.appendChild(el);
      setTimeout(() => el.remove(), 14000);
    }
    setInterval(spawnStar, 600);
    for(let i=0;i<12;i++) setTimeout(spawnStar, i*200);
  </script>
</body>
</html>
