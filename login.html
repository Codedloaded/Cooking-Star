<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login - Recipe Finder</title>
</head>
<body>

    <!-- Navigation Bar -->
    <div>
        <img src="logo.jpg" alt="logo" height="50" width="50">
        <a href="index.html">Home</a>
        <span>|</span>
        <a href="recipes-list.html">Recipes</a>
        <span>|</span>
        <a href="search-results.html">Search</a>
        <span>|</span>
        <a href="favorites.html">Favorites</a>
        <span>|</span>
        <a href="login.html">Logout</a>
    </div>
    <hr>

    <!-- Welcome Message -->
    <h1>Welcome to RecipeFinder!</h1>
    <p>Discover and share amazing recipes from around the world</p>

    <h2>Login to Your Account</h2>
    
    <form>
        <!-- Email Field -->
        <label for="email">Email:</label>
        <input type="email" id="email" placeholder="Enter your email" required>
        <br><br>
        
        <!-- Password Field -->
        <label for="password">Password:</label>
        <input type="password" id="password" placeholder="Enter your password" required>
        <br><br>
        
        <!-- Remember Me & Forgot Password -->
        <input type="checkbox" id="remember">
        <label for="remember">Remember me</label>
        <span>|</span>
        <a href="#">Forgot Password?</a>
        <br><br>
        
        <!-- Login Button -->
        <input type="submit" value="Login">
        <br><br>
        
        <!-- Register Link -->
        <p>
            Don't have an account? <a href="signup.html">Register here</a>
        </p>
    </form>

</body>
</html>
