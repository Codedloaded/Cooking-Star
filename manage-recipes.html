<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Manage Recipes — نجمة الطبخ</title>
  <link href="https://fonts.googleapis.com/css2?family=Fredoka+One&family=Nunito:wght@400;600;700;800&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="style.css">
  <link rel="stylesheet" href="manage.css">
  <link rel="icon" type="image/png" href="NewLogo.png">
</head>
<body>

  <div id="glitter-container"></div>
  <div class="chef-duo-deco"></div>

  <nav class="navbar">
    <a href="admin.html" class="logo-link">
      <img src="NewLogo.png" alt="نجمة الطبخ Logo" class="logo-img">
    </a>
    <div class="nav-links">
      <!-- populated by buildNavbar() in shared.js -->
    </div>
  </nav>

  <div class="page-header">
    <h2>📋 Manage Recipes</h2>
    <p>Edit or remove recipes from the collection ✨</p>
  </div>

  <div class="manage-wrap">

    <div class="card hint-card">
      <p class="hint-text">
        Click <strong>✏️ Edit</strong> to update a recipe or <strong>🗑️ Delete</strong> to remove it permanently.
      </p>
    </div>

    <!-- Recipes Table — rendered by JS -->
    <div class="card table-card">
      <table>
        <thead>
          <tr>
            <th>Image</th>
            <th>Recipe Name</th>
            <th>Course</th>
            <th>Time</th>
            <th>Actions</th>
          </tr>
        </thead>
        <tbody id="recipes-tbody">
        </tbody>
      </table>
      <div id="empty-msg" style="display:none; text-align:center; padding:40px; color:var(--text-light); font-family:'Fredoka One',sans-serif; font-size:1.1rem;">
        🫙 No recipes yet. <a href="add_recipe.html" style="color:var(--pink-deep);">Add one!</a>
      </div>
    </div>

    <!-- Edit Panel — injected dynamically -->
    <div id="edit-panel" style="display:none;">
      <h2 style="font-family:'Fredoka One',sans-serif; font-size:1.6rem;
          background:linear-gradient(135deg,var(--pink-deep),var(--peach-warm));
          -webkit-background-clip:text; -webkit-text-fill-color:transparent;
          margin:24px 0 12px;">✏️ Edit Recipe</h2>

      <form id="edit-form">
        <div class="form-row">
          <label>Recipe Name:</label>
          <input type="text" id="edit-name" required>
        </div>
        <div class="form-row">
          <label>Course Type:</label>
          <select id="edit-course">
            <option value="Appetizer">🥗 Appetizer</option>
            <option value="Main Course">🍽️ Main Course</option>
            <option value="Dessert">🍰 Dessert</option>
          </select>
        </div>
        <div class="form-row">
          <label>Cooking Time (minutes):</label>
          <input type="number" id="edit-time" min="1">
        </div>
        <div class="form-row">
          <label>Difficulty (1 Easy – 5 Hard):</label>
          <input type="range" id="edit-difficulty" min="1" max="5">
        </div>
        <div class="form-row">
          <label>Current Image:</label>
          <img id="edit-img-preview" src="" alt="recipe" class="form-preview-img">
        </div>
        <div class="form-row">
          <label>Change Image:</label>
          <input type="file" id="edit-image-input" accept="image/*">
        </div>
        <div class="form-row">
          <label>Instructions:</label>
          <textarea id="edit-instructions" rows="5"></textarea>
        </div>
        <div class="form-btns">
          <input type="submit" value="💾 Save Changes">
          <button type="button" class="btn-cancel" onclick="closeEditPanel()">✖ Cancel</button>
        </div>
      </form>
    </div>

    <!-- Delete Panel — injected dynamically -->
    <div id="delete-panel" style="display:none;">
      <hr style="border:none; border-top:2px dashed rgba(255,150,190,0.4); margin:24px 0;">
      <h2 style="font-family:'Fredoka One',sans-serif; font-size:1.6rem; color:#b23a48; text-align:center; margin-bottom:8px;">
        🗑️ Delete Recipe
      </h2>
      <p style="text-align:center; color:var(--text-light); font-weight:700; margin-bottom:16px;">
        ⚠️ This action is permanent and cannot be undone.
      </p>
      <div class="card" style="max-width:500px; margin:0 auto; text-align:center; padding:28px;">
        <div style="font-size:3rem; margin-bottom:12px;">🍽️</div>
        <div id="delete-recipe-name" style="font-family:'Fredoka One',sans-serif; font-size:1.3rem; color:var(--pink-deep); margin-bottom:6px;"></div>
        <div id="delete-recipe-course" style="font-size:0.88rem; font-weight:800; color:var(--text-light); margin-bottom:24px;"></div>
        <div style="display:flex; gap:12px; justify-content:center;">
          <button class="btn-confirm-delete" id="confirm-delete-btn">✅ Yes, Delete</button>
          <button class="btn-cancel" onclick="closeDeletePanel()">✖ Cancel</button>
        </div>
      </div>
    </div>

  </div><!-- /manage-wrap -->

  <div id="toast"></div>

  <script src="shared.js"></script>
  <script src="glitter.js"></script>
  <script src = "manage.js"></script>
  
</body>
</html>
