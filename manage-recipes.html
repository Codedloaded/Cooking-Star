<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Manage Recipes — نجمة الطبخ</title>
  <link href="https://fonts.googleapis.com/css2?family=Fredoka+One&family=Nunito:wght@400;600;700;800&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="style.css">
  <link rel="stylesheet" href="manage.css">
  <link rel="icon" type="image/png" href="NewLogo.png">
</head>
<body>

  <div id="glitter-container"></div>
  <div class="chef-duo-deco"></div>

  <nav class="navbar">
    <a href="admin.html" class="logo-link">
      <img src="NewLogo.png" alt="نجمة الطبخ Logo" class="logo-img">
    </a>
    <div class="nav-links">
      <!-- populated by buildNavbar() in shared.js -->
    </div>
  </nav>

  <div class="page-header">
    <h2>📋 Manage Recipes</h2>
    <p>Edit or remove recipes from the collection ✨</p>
  </div>

  <div class="manage-wrap">

    <div class="card hint-card">
      <p class="hint-text">
        Click <strong>✏️ Edit</strong> to update a recipe or <strong>🗑️ Delete</strong> to remove it permanently.
      </p>
    </div>

    <!-- Recipes Table — rendered by JS -->
    <div class="card table-card">
      <table>
        <thead>
          <tr>
            <th>Image</th>
            <th>Recipe Name</th>
            <th>Course</th>
            <th>Time</th>
            <th>Actions</th>
          </tr>
        </thead>
        <tbody id="recipes-tbody">
        </tbody>
      </table>
      <div id="empty-msg" style="display:none; text-align:center; padding:40px; color:var(--text-light); font-family:'Fredoka One',sans-serif; font-size:1.1rem;">
        🫙 No recipes yet. <a href="add_recipe.html" style="color:var(--pink-deep);">Add one!</a>
      </div>
    </div>

    <!-- Edit Panel — injected dynamically -->
    <div id="edit-panel" style="display:none;">
      <h2 style="font-family:'Fredoka One',sans-serif; font-size:1.6rem;
          background:linear-gradient(135deg,var(--pink-deep),var(--peach-warm));
          -webkit-background-clip:text; -webkit-text-fill-color:transparent;
          margin:24px 0 12px;">✏️ Edit Recipe</h2>

      <form id="edit-form">
        <div class="form-row">
          <label>Recipe Name:</label>
          <input type="text" id="edit-name" required>
        </div>
        <div class="form-row">
          <label>Course Type:</label>
          <select id="edit-course">
            <option value="Appetizer">🥗 Appetizer</option>
            <option value="Main Course">🍽️ Main Course</option>
            <option value="Dessert">🍰 Dessert</option>
          </select>
        </div>
        <div class="form-row">
          <label>Cooking Time (minutes):</label>
          <input type="number" id="edit-time" min="1">
        </div>
        <div class="form-row">
          <label>Difficulty (1 Easy – 5 Hard):</label>
          <input type="range" id="edit-difficulty" min="1" max="5">
        </div>
        <div class="form-row">
          <label>Current Image:</label>
          <img id="edit-img-preview" src="" alt="recipe" class="form-preview-img">
        </div>
        <div class="form-row">
          <label>Change Image:</label>
          <input type="file" id="edit-image-input" accept="image/*">
        </div>
        <div class="form-row">
          <label>Instructions:</label>
          <textarea id="edit-instructions" rows="5"></textarea>
        </div>
        <div class="form-btns">
          <input type="submit" value="💾 Save Changes">
          <button type="button" class="btn-cancel" onclick="closeEditPanel()">✖ Cancel</button>
        </div>
      </form>
    </div>

    <!-- Delete Panel — injected dynamically -->
    <div id="delete-panel" style="display:none;">
      <hr style="border:none; border-top:2px dashed rgba(255,150,190,0.4); margin:24px 0;">
      <h2 style="font-family:'Fredoka One',sans-serif; font-size:1.6rem; color:#b23a48; text-align:center; margin-bottom:8px;">
        🗑️ Delete Recipe
      </h2>
      <p style="text-align:center; color:var(--text-light); font-weight:700; margin-bottom:16px;">
        ⚠️ This action is permanent and cannot be undone.
      </p>
      <div class="card" style="max-width:500px; margin:0 auto; text-align:center; padding:28px;">
        <div style="font-size:3rem; margin-bottom:12px;">🍽️</div>
        <div id="delete-recipe-name" style="font-family:'Fredoka One',sans-serif; font-size:1.3rem; color:var(--pink-deep); margin-bottom:6px;"></div>
        <div id="delete-recipe-course" style="font-size:0.88rem; font-weight:800; color:var(--text-light); margin-bottom:24px;"></div>
        <div style="display:flex; gap:12px; justify-content:center;">
          <button class="btn-confirm-delete" id="confirm-delete-btn">✅ Yes, Delete</button>
          <button class="btn-cancel" onclick="closeDeletePanel()">✖ Cancel</button>
        </div>
      </div>
    </div>

  </div><!-- /manage-wrap -->

  <div id="toast"></div>

  <script src="shared.js"></script>
  <script src="glitter.js"></script>
  <script>
    let currentEditId   = null;
    let currentDeleteId = null;
    let editImageDataURL = "";

    // ── Render Table ──
    function renderTable() {
      const tbody   = document.getElementById('recipes-tbody');
      const emptyMsg = document.getElementById('empty-msg');
      const recipes = getRecipes();

      if (recipes.length === 0) {
        tbody.innerHTML = '';
        emptyMsg.style.display = 'block';
        return;
      }
      emptyMsg.style.display = 'none';

      tbody.innerHTML = recipes.map(r => {
        const badgeClass = getCourseBadgeClass(r.course);
        return `
          <tr data-id="${r.id}">
            <td><img src="${r.image}" alt="${r.name}" width="80" height="60"
                style="object-fit:cover; border-radius:10px; border:2px solid rgba(255,150,190,0.3);"
                onerror="this.src='NewLogo.png'"></td>
            <td style="font-weight:700; color:var(--text-dark);">${r.name}</td>
            <td><span class="course-badge ${badgeClass}">${r.course}</span></td>
            <td style="color:var(--text-mid);">⏱ ${r.time} min</td>
            <td class="action-cell">
              <button class="btn-edit" onclick="openEditPanel('${r.id}')">✏️ Edit</button>
              <button class="btn-delete" onclick="openDeletePanel('${r.id}')">🗑️ Delete</button>
            </td>
          </tr>`;
      }).join('');
    }

    // ── Edit ──
    function openEditPanel(id) {
      const r = getRecipeById(id);
      if (!r) return;
      currentEditId    = id;
      editImageDataURL = "";

      document.getElementById('edit-name').value         = r.name;
      document.getElementById('edit-course').value       = r.course;
      document.getElementById('edit-time').value         = r.time;
      document.getElementById('edit-difficulty').value   = r.difficulty || 2;
      document.getElementById('edit-instructions').value = r.description;
      document.getElementById('edit-img-preview').src    = r.image;

      document.getElementById('delete-panel').style.display = 'none';
      document.getElementById('edit-panel').style.display   = 'block';
      document.getElementById('edit-panel').scrollIntoView({ behavior: 'smooth', block: 'start' });
    }

    function closeEditPanel() {
      document.getElementById('edit-panel').style.display = 'none';
      currentEditId = null;
    }

    // Image preview in edit form
    document.getElementById('edit-image-input').addEventListener('change', function(e) {
      const file = e.target.files[0];
      if (!file) return;
      const reader = new FileReader();
      reader.onload = ev => {
        editImageDataURL = ev.target.result;
        document.getElementById('edit-img-preview').src = ev.target.result;
      };
      reader.readAsDataURL(file);
    });

    document.getElementById('edit-form').addEventListener('submit', function(e) {
      e.preventDefault();
      if (!currentEditId) return;

      const original = getRecipeById(currentEditId);
      const updated  = {
        ...original,
        name:        document.getElementById('edit-name').value.trim(),
        course:      document.getElementById('edit-course').value,
        time:        parseInt(document.getElementById('edit-time').value),
        difficulty:  parseInt(document.getElementById('edit-difficulty').value),
        description: document.getElementById('edit-instructions').value.trim(),
        image:       editImageDataURL || original.image,
      };

      updateRecipeInStore(updated);
      closeEditPanel();
      renderTable();
      showToast(`✅ "${updated.name}" updated successfully!`);
      window.scrollTo({ top: 0, behavior: 'smooth' });
    });

    // ── Delete ──
    function openDeletePanel(id) {
      const r = getRecipeById(id);
      if (!r) return;
      currentDeleteId = id;

      document.getElementById('delete-recipe-name').textContent   = r.name;
      document.getElementById('delete-recipe-course').textContent = r.course;

      document.getElementById('edit-panel').style.display   = 'none';
      document.getElementById('delete-panel').style.display = 'block';
      document.getElementById('delete-panel').scrollIntoView({ behavior: 'smooth', block: 'start' });
    }

    function closeDeletePanel() {
      document.getElementById('delete-panel').style.display = 'none';
      currentDeleteId = null;
    }

    document.getElementById('confirm-delete-btn').addEventListener('click', function() {
      if (!currentDeleteId) return;
      const name = getRecipeById(currentDeleteId)?.name || 'Recipe';
      deleteRecipeFromStore(currentDeleteId);
      closeDeletePanel();
      renderTable();
      showToast(`🗑️ "${name}" deleted.`);
      window.scrollTo({ top: 0, behavior: 'smooth' });
    });

    // ── Course badge helper (local, for table) ──
    // Already available from shared.js

    // ── Init ──
    renderTable();
  </script>
</body>
</html>
