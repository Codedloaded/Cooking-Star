<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Search Recipes — نجمة الطبخ</title>
  <link href="https://fonts.googleapis.com/css2?family=Fredoka+One&family=Nunito:wght@400;600;700;800&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="style.css">
  <link rel="icon" type="image/png" href="icon.png">
  <style>
    /* ── Shared action button styles ── */
    .btn-view, .btn-fav {
      font-family: 'Fredoka One', sans-serif;
      font-size: 0.85rem;
      padding: 8px 20px;
      border-radius: var(--border-pill);
      text-decoration: none;
      transition: all 0.22s ease;
      cursor: pointer;
      display: inline-flex;
      align-items: center;
      gap: 5px;
    }
    .btn-view {
      background: linear-gradient(135deg, var(--pink-hot), var(--pink-deep));
      color: #fff;
      box-shadow: 0 4px 14px rgba(232,35,95,0.35);
    }
    .btn-view:hover {
      transform: translateY(-2px);
      box-shadow: 0 8px 20px rgba(232,35,95,0.48);
    }
    .btn-fav {
      background: rgba(255,240,246,0.9);
      color: var(--pink-deep);
      border: 2px solid var(--pink-medium);
    }
    .btn-fav:hover {
      background: linear-gradient(135deg, var(--pink-medium), var(--pink-accent));
      color: #fff;
      border-color: transparent;
      transform: translateY(-2px);
    }
    .btn-fav.favorited {
      background: linear-gradient(135deg, var(--pink-hot), var(--pink-deep));
      color: #fff;
      border-color: transparent;
    }

    /* ── Course badges ── */
    .course-badge {
      font-family: 'Fredoka One', sans-serif;
      font-size: 0.75rem;
      padding: 3px 12px;
      border-radius: var(--border-pill);
    }
    .badge-main       { background: rgba(194,51,122,0.12); color: var(--pink-deep); }
    .badge-appetizer  { background: rgba(255,179,71,0.18); color: #a05a00; }
    .badge-dessert    { background: rgba(90,191,78,0.15);  color: #2d7a22; }

    /* ── Toast ── */
    #toast {
      position: fixed;
      bottom: 32px;
      left: 50%;
      transform: translateX(-50%) translateY(20px);
      background: linear-gradient(135deg, var(--pink-hot), var(--pink-deep));
      color: #fff;
      padding: 14px 28px;
      border-radius: var(--border-pill);
      font-family: 'Fredoka One', sans-serif;
      font-size: 0.97rem;
      box-shadow: 0 8px 28px rgba(232,35,95,0.4);
      z-index: 9999;
      opacity: 0;
      pointer-events: none;
      transition: opacity 0.3s ease, transform 0.3s ease;
      white-space: nowrap;
    }
    #toast.show {
      opacity: 1;
      transform: translateX(-50%) translateY(0);
    }

    @media (max-width: 600px) {
      .result-card { grid-template-columns: 1fr; }
      .result-card img { width: 100%; height: 180px; min-height: unset; }
    }
  </style>
</head>
<body>

  <!-- ─── Floating Glitter Stars ─── -->
  <div id="glitter-container"></div>

  <!-- ─── Chef Duo Corner ─── -->
  <div class="chef-duo-deco"></div>

  <!-- ─── Navigation Bar ─── -->
  <nav class="navbar">
    <a href="user-dashboard.html" class="logo-link">
      <img src="NewLogo.png" alt="Cooking Star Logo" class="logo-img">
    </a>
    <div class="nav-links">
      <a href="user-dashboard.html">Home</a>
      <a href="recipes-list.html">Recipes</a>
      <a href="search-results.html" class="active">Search</a>
      <a href="favorites.html">Favorites</a>
      <a href="login.html" class="logout">Logout</a>
    </div>
  </nav>

  <!-- ─── Page Header ─── -->
  <div class="page-header">
    <h2>Search Recipes</h2>
    <p>Find your next favourite dish in seconds </p>
  </div>

  <div class="container" style="margin-top: 20px;">

    <!-- Search Panel -->
    <div class="search-panel">
      <div class="search-main-row">
        <input type="search" id="search-input" placeholder="e.g. Grilled Chicken, pasta, lemon...">
        <button class="btn btn-primary" onclick="runSearch()">Search</button>
        <button class="btn btn-secondary" onclick="clearSearch()">Clear</button>
      </div>
      <div class="search-options">
        <label class="radio-option">
          <input type="radio" name="stype" id="by-dish" value="dish" checked onchange="runSearch()">
          By Dish Name
        </label>
        <label class="radio-option">
          <input type="radio" name="stype" id="by-ingredient" value="ingredient" onchange="runSearch()">
          By Ingredient
        </label>
        <label class="radio-option">
          <input type="radio" name="stype" id="by-course" value="course" onchange="runSearch()">
          By Course
        </label>
      </div>
      <div id="recent-searches-wrap" style="margin-top: 14px; display: none;">
        <div style="font-size: 0.8rem; font-weight: 800; color: var(--text-light); margin-bottom: 6px;">Recent searches:</div>
        <div class="recent-tags" id="recent-tags"></div>
      </div>
    </div>

    <!-- Results Header -->
    <div class="results-header" id="results-header" style="display: none;">
      <div class="results-count">Found <span id="result-count">0</span> results</div>
      <select class="sort-select" id="sort-select" onchange="sortAndRender()">
        <option value="default">Sort: Default</option>
        <option value="name">Sort: A–Z</option>
        <option value="time">Sort: Quickest First</option>
        <option value="difficulty">Sort: Easiest First</option>
      </select>
    </div>

    <!-- Results -->
    <div id="results-container"></div>

    <!-- No Results -->
    <div class="no-results" id="no-results">
      <h3>🫙 No recipes found</h3>
      <p>Try searching by a different name, ingredient, or course type.</p>
    </div>

    <!-- Default State -->
    <div class="default-state" id="default-state">
      <div class="default-state-title">What are you craving?</div>
      <p>Type a dish name or ingredient to get started!</p>
    </div>

  </div>

  <div id="toast"></div>

  <script src="glitter.js"></script>
  <script src="shared.js"></script>
  <script>
    initSearchPage();
  </script>

</body>
</html>
