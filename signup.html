<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Sign Up - Cooking-Star</title>
</head>
<body>

    <div>
        <img src="logo.jpg" alt="logo" height="100" width="100">
        <a href="index.html">Home</a>
        <span>|</span>
        <a href="login.html">Login</a>
        <span>|</span>
        <a href="signup.html">Sign Up</a>
    </div>
    <hr>

    <h2>Join Cooking-Star!</h2>
    <p>Create your account and start exploring recipes.</p>

    <h3>Create Account</h3>

    <form action="login.html">

        <label for="first-name">First Name:</label>
        <input type="text" id="first-name" placeholder="Enter your first name" required>
        <br><br>

        <label for="last-name">Last Name:</label>
        <input type="text" id="last-name" placeholder="Enter your last name" required>
        <br><br>

        <label for="username">Username:</label>
        <input type="text" id="username" placeholder="Choose a username" required>
        <br><br>

        <label for="email">Email:</label>
        <input type="email" id="email" placeholder="Enter your email" required>
        <br><br>

        <label for="password">Password:</label>
        <input type="password" id="password" placeholder="Create a password" required>
        <br><br>

        <label for="confirm-password">Confirm Password:</label>
        <input type="password" id="confirm-password" placeholder="Confirm your password" required>
        <br><br>

        <label>Sign up as:</label>
        <input type="radio" name="role" id="user" value="user" checked>
        <label for="user">User</label>
        <input type="radio" name="role" id="admin" value="admin">
        <label for="admin">Admin</label>
        <br><br>

        <label>Gender:</label>
        <input type="radio" name="gender" id="male" value="male" checked>
        <label for="male">Male</label>
        <input type="radio" name="gender" id="female" value="female">
        <label for="female">Female</label>
        <br><br>

        <input type="submit" value="Sign Up">
        <br><br>

        <p>Already have an account? <a href="login.html">Login here</a></p>

    </form>

</body>
</html>
