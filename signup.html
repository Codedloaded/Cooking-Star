<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sign Up — نجمة الطبخ</title>
    <link href="https://fonts.googleapis.com/css2?family=Fredoka+One&family=Nunito:wght@400;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="MM.css">
    <link rel="icon" type="image/png" href="NewLogo.png">
</head>
<body>
    <div id="glitter-container"></div>

    <nav class="navbar">
        <a href="index.html" class="logo-link">
            <img src="NewLogo.png" alt="نجمة الطبخ" class="logo-img">
        </a>
        <div class="nav-links">
            <!-- built by buildNavbar() in shared.js -->
        </div>
    </nav>

    <header class="page-header">
        <h1>Join Cooking-Star!</h1>
        <p>Create your account and start exploring recipes ✨</p>
    </header>

    <main class="auth-container">
        <div class="card" style="max-width:550px; width:100%;">
            <h3>📝 Create Account</h3>

            <form id="signup-form">
                <div class="form-group-horizontal">
                    <label for="first-name">First Name:</label>
                    <input type="text" id="first-name" placeholder="Enter your first name" required>
                </div>

                <div class="form-group-horizontal">
                    <label for="last-name">Last Name:</label>
                    <input type="text" id="last-name" placeholder="Enter your last name" required>
                </div>

                <div class="form-group-horizontal">
                    <label for="username">Username:</label>
                    <input type="text" id="username" placeholder="Choose a username" required>
                </div>

                <div class="form-group-horizontal">
                    <label for="email">Email:</label>
                    <input type="email" id="email" placeholder="Enter your email" required>
                </div>

                <div class="form-group-horizontal">
                    <label for="password">Password:</label>
                    <input type="password" id="password" placeholder="Create a password (min 6 chars)" required>
                </div>

                <div class="form-group-horizontal">
                    <label for="confirm-password">Confirm:</label>
                    <input type="password" id="confirm-password" placeholder="Confirm your password" required>
                </div>

                <div class="role-selection">
                    <label>Sign up as:</label>
                    <label style="display:inline;"><input type="radio" name="role" value="user" checked> 👤 User</label>
                    <label style="display:inline;"><input type="radio" name="role" value="admin"> 🛠️ Admin</label>
                </div>

                <div class="role-selection">
                    <label>Gender:</label>
                    <label style="display:inline;"><input type="radio" name="gender" value="male" checked> Male</label>
                    <label style="display:inline;"><input type="radio" name="gender" value="female"> Female</label>
                </div>

                <div id="signup-error" style="
                    display:none; color:var(--red-warm);
                    font-size:0.85rem; font-weight:800;
                    text-align:center; margin-bottom:12px;
                    background:rgba(232,76,61,0.08);
                    padding:10px 16px; border-radius:12px;
                    border:1.5px solid rgba(232,76,61,0.3);
                "></div>

                <button type="submit" class="btn btn-primary" style="width:100%; justify-content:center; margin-top:10px;">
                    🚀 Create Account
                </button>

                <p class="auth-footer">
                    Already have an account? <a href="login.html">Login here</a>
                </p>
            </form>
        </div>
    </main>

    <div id="toast"></div>

    <script src="shared.js"></script>
    <script>
        // Auto-save form draft as user types
        ['first-name','last-name','username','email'].forEach(id => {
            const el = document.getElementById(id);
            if (!el) return;
            // Restore draft
            const draft = getFormDraft();
            if (draft[id]) el.value = draft[id];
            // Save on input
            el.addEventListener('input', () => {
                saveFormDraft({ ...getFormDraft(), [id]: el.value });
            });
        });

        document.getElementById('signup-form').addEventListener('submit', function(e) {
            e.preventDefault();

            const firstName       = document.getElementById('first-name').value.trim();
            const lastName        = document.getElementById('last-name').value.trim();
            const username        = document.getElementById('username').value.trim();
            const email           = document.getElementById('email').value.trim();
            const password        = document.getElementById('password').value;
            const confirmPassword = document.getElementById('confirm-password').value;
            const role            = document.querySelector('input[name="role"]:checked').value;
            const gender          = document.querySelector('input[name="gender"]:checked').value;
            const errorEl         = document.getElementById('signup-error');

            // Validation
            if (password !== confirmPassword) {
                errorEl.textContent = '⚠️ Passwords do not match.';
                errorEl.style.display = 'block';
                return;
            }
            if (password.length < 6) {
                errorEl.textContent = '⚠️ Password must be at least 6 characters.';
                errorEl.style.display = 'block';
                return;
            }

            const result = registerUser({ firstName, lastName, username, email, password, role, gender });

            if (!result.ok) {
                errorEl.textContent = '⚠️ ' + result.error;
                errorEl.style.display = 'block';
                return;
            }

            errorEl.style.display = 'none';
            clearFormDraft(); // wipe saved draft on success

            // Auto-login
            const loginResult = loginUser(email, password, role);
            if (loginResult.ok) setSession(loginResult.user);

            showToast(`Welcome to Cooking-Star, ${firstName}! 🎉`);

            setTimeout(() => {
                window.location.href = role === 'admin' ? 'admin.html' : 'user-dashboard.html';
            }, 1000);
        });
    </script>
    <script src="glitter.js"></script>
</body>
</html>
