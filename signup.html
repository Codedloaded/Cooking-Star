<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Sign Up - RecipeFinder</title>
</head>
<body>

    <!-- Navigation Bar with Logo and links exactly like the example -->
    <div>
        <img src="logo.jpg" alt="logo" height="50" width="50">
        <a href="index.html">Home</a>
        <span>|</span>
        <a href="recipes.html">Recipes</a>
        <span>|</span>
        <a href=
        "search.html">Search</a>
        <span>|</span>
        <a href="favorites.html">Favorites</a>
        <span>|</span>
        <a href="logout.html">Logout</a>
    </div>
    <hr>

    <!-- Sign Up Section -->
    <h2>Join RecipeFinder!</h2>
    <p>Create your account and start exploring recipes</p>

    <h3>Create Account</h3>
    
    <form>
        <!-- First Name - label and input on same line -->
        <div>
            <label for="first-name">First Name:</label>
            <input type="text" id="first-name" placeholder="Enter your first name" required>
        </div>
        <br>

        <!-- Last Name - label and input on same line -->
        <div>
            <label for="last-name">Last Name:</label>
            <input type="text" id="last-name" placeholder="Enter your last name" required>
        </div>
        <br>

        <!-- Username - label and input on same line -->
        <div>
            <label for="username">Username:</label>
            <input type="text" id="username" placeholder="Choose a username" required>
        </div>
        <br>

        <!-- Gender - radio buttons inline -->
        <div>
            <label>Gender:</label>
            <label>
                <input type="radio" name="gender" value="male" checked> Male
            </label>
            <label>
                <input type="radio" name="gender" value="female"> Female
            </label>
        </div>
        <br>

        <!-- Email - label and input on same line -->
        <div>
            <label for="email">Email:</label>
            <input type="email" id="email" placeholder="Enter your email" required>
        </div>
        <br>
        
        <!-- Password - label and input on same line -->
        <div>
            <label for="password">Password:</label>
            <input type="password" id="password" placeholder="Create a password" required>
        </div>
        <br>

        <!-- Confirm Password - label and input on same line -->
        <div>
            <label for="confirm-password">Confirm Password:</label>
            <input type="password" id="confirm-password" placeholder="Confirm your password" required>
        </div>
        <br>
        
        <!-- Sign Up Button -->
        <button type="submit">Sign Up</button>
        
        <!-- Login Link -->
        <p>
            Already have an account? <a href="login.html">Login here</a>
        </p>
    </form>

</body>
</html>
