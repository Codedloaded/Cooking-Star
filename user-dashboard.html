<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Dashboard — نجمة الطبخ</title>
  <link href="https://fonts.googleapis.com/css2?family=Fredoka+One&family=Nunito:wght@400;600;700;800&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="style.css">
  <link rel="stylesheet" href="userdashboard.css">
  <link rel="icon" type="image/png" href="icon.png">
  
</head>
<body>

  <!-- ─── Floating Glitter Stars ─── -->
  <div id="glitter-container"></div>

  <!-- ─── Chef Duo Corner ─── -->
  <div class="chef-duo-deco"></div>

  <!-- ─── Navigation Bar ─── -->
  <nav class="navbar">
    <a href="user-dashboard.html" class="logo-link">
      <img src="NewLogo.png" alt="Cooking Star Logo" class="logo-img">
    </a>
    <div class="nav-links">
      <!-- populated by buildNavbar() in shared.js -->
    </div>
  </nav>

  <!-- ─── Page Header ─── -->
  <div class="page-header">
    <h1>Welcome to Cooking Star!</h1>
    <p>Discover delicious recipes made with love ✨</p>
  </div>

  <div class="container" style="margin-top: 70px;">

    <!-- Search Card -->
    <div class="dashboard-search-card">
      <h3>🔍 Find a Recipe</h3>
      <div class="search-row">
        <input type="search" id="dashboard-search" placeholder="Search recipes, ingredients... e.g. Chicken">
        <button class="btn btn-primary" onclick="dashApplySearch()">Search</button>
      </div>
    </div>

    <!-- Stats Bar -->
    <div class="stats-bar">
      <div class="stat-chip">
        <span class="stat-num" id="stat-total">6</span>
        <span>Total Recipes</span>
      </div>
      <div class="stat-chip">
        <span class="stat-num" id="stat-shown">6</span>
        <span>Showing</span>
      </div>
      <div class="stat-chip">
        <span class="stat-num" id="stat-favs">0</span>
        <span>My Favorites</span>
      </div>
    </div>

    <!-- Filter Bar -->
    <div class="filter-bar">
      <button class="filter-btn active" onclick="dashFilterRecipes('all', this)">🍴 All</button>
      <button class="filter-btn" onclick="dashFilterRecipes('Main Course', this)">🍽️ Main Course</button>
      <button class="filter-btn" onclick="dashFilterRecipes('Appetizer', this)">🥗 Appetizer</button>
      <button class="filter-btn" onclick="dashFilterRecipes('Dessert', this)">🍰 Dessert</button>
    </div>

    <!-- Section Heading -->
    <div class="section-heading">🌟 Browse Recipes</div>

    <!-- Recipes Grid -->
    <div class="recipes-grid" id="recipes-grid"></div>

    <!-- No Results -->
    <div id="no-results">
      <p>🫙 No recipes found. Try a different search!</p>
    </div>

  </div>

  <div id="toast"></div>

  <script src="glitter.js"></script>
  <script src="shared.js"></script>
  <script>
    initDashboard();
  </script>

</body>
</html>
